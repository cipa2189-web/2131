services:
  - type: web
    name: messenger-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: messenger-db
          property: connectionString

databases:
  - name: messenger-db
    databaseName: messenger
    user: messenger
    plan: free
